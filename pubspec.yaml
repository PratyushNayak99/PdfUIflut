name: pdf_audio_reader
description: A Flutter app for converting PDF documents to audio
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.1
  
  # Navigation
  go_router: ^13.1.0
  
  # UI Components
  google_fonts: ^6.1.0
  flutter_animate: ^4.3.0
  
  # Local Storage (for settings)
  shared_preferences: ^2.2.2
  
  # File Picker (for upload simulation)
  file_picker: ^6.1.1
  
  # Toast notifications
  fluttertoast: ^8.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
